
services:
  backend:
    build:
      context: ./backend
    expose:
      - "8000"
    env_file:
      - .env
    depends_on:
      - postgres
  
  nginx:
    image: nginx:latest # FIXME: краще використовувати певну версію
    ports:
      # - "80:80" # http
      # - "443:443" # https
      - "8080:80"
    depends_on:
      - backend
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro # read only
    restart: always
  
  postgres:
    image: postgres:17
    container_name: postgres
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_HOST: ${DB_HOST}
      POSTGRES_PORT: ${DB_PORT}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    expose:
      - "5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/1-init.sql:/docker-entrypoint-initdb.d/1-init.sql:ro

  
volumes:
  postgres_data:
